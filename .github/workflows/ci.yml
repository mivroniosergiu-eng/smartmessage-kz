name: CI Quality Gate
on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test:cov
      - name: No test weakening
        if: github.event_name == 'pull_request'
        run: |
          if git diff origin/${{ github.base_ref }}...HEAD -- '*.test.ts' '*.spec.ts' | grep -E '^\+.*(\.skip\(|\.only\(|\bxit\()'; then
            echo "::error::Запрещено глушить/ослаблять тесты через .skip/.only/xit. Чините код."
            exit 1
          fi
