name: CI Quality Gate
on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smartmessage
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/smartmessage?schema=public
      REDIS_URL: redis://localhost:6380
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @smartmessage/db exec prisma generate
      - run: pnpm --filter @smartmessage/db exec prisma migrate deploy
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test:cov
      - name: No test weakening
        if: github.event_name == 'pull_request'
        run: |
          if git diff origin/${{ github.base_ref }}...HEAD -- '*.test.ts' '*.spec.ts' | grep -E '^\+.*(\.skip\(|\.only\(|\bxit\()'; then
            echo "::error::Запрещено глушить/ослаблять тесты через .skip/.only/xit. Чините код."
            exit 1
          fi
