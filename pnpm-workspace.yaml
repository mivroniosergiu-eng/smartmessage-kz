packages:
  - 'apps/*'
  - 'packages/*'

onlyBuiltDependencies:
  - esbuild
  - prisma
  - '@prisma/client'
  - '@prisma/engines'

ignoredBuiltDependencies:
  - puppeteer

verifyDepsBeforeRun: false

allowBuilds:
  '@nestjs/core': set this to true or false
  '@swc/core': set this to true or false
  puppeteer: set this to true or false
